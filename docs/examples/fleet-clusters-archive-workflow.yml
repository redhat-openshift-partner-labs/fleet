name: Archive Deprovisioned Cluster

on:
  deployment_status:

jobs:
  archive:
    if: >-
      github.event.deployment.environment == 'deprovision' &&
      github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract cluster name
        id: cluster
        run: echo "name=${{ github.event.deployment.payload.cluster_name }}" >> "$GITHUB_OUTPUT"

      - name: Archive cluster
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b archive/${{ steps.cluster.outputs.name }}
          git mv provision/${{ steps.cluster.outputs.name }} archive/${{ steps.cluster.outputs.name }}
          rm -f deprovision/${{ steps.cluster.outputs.name }}-archive
          git add -A
          git commit -m "chore: archive ${{ steps.cluster.outputs.name }}"

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin archive/${{ steps.cluster.outputs.name }}
          gh pr create \
            --title "chore: archive ${{ steps.cluster.outputs.name }}" \
            --body "Auto-archive after successful deprovision." \
            --base main
          gh pr merge --auto --squash archive/${{ steps.cluster.outputs.name }}
