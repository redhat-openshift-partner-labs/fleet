apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: extract-cert-material
spec:
  params:
    - name: cluster-name
      type: string
    - name: pipeline-image
      type: string
  steps:
    - name: extract
      image: $(params.pipeline-image)
      imagePullPolicy: IfNotPresent
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        fleet-extract-cert-material \
          --cluster-name "$(params.cluster-name)"
