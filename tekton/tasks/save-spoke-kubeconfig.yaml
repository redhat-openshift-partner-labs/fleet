apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: save-spoke-kubeconfig
spec:
  params:
    - name: cluster-name
      type: string
    - name: pipeline-image
      type: string
  workspaces:
    - name: shared
  steps:
    - name: save
      image: $(params.pipeline-image)
      imagePullPolicy: IfNotPresent
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        fleet-save-spoke-kubeconfig \
          --cluster-name "$(params.cluster-name)" \
          --kubeconfig-file "$(workspaces.shared.path)/kubeconfig"
