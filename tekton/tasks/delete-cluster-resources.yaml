---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: delete-cluster-resources
spec:
  params:
    - name: cluster-name
      type: string
    - name: pipeline-image
      type: string
  steps:
    - name: delete
      image: $(params.pipeline-image)
      imagePullPolicy: Always
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        fleet-delete-cluster-resources --cluster-name "$(params.cluster-name)"
