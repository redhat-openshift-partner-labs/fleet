apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: wait-for-ssl-ready
spec:
  params:
    - name: cluster-name
      type: string
    - name: pipeline-image
      type: string
  steps:
    - name: wait
      image: $(params.pipeline-image)
      imagePullPolicy: IfNotPresent
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        fleet-wait-for-ssl-ready \
          --cluster-name "$(params.cluster-name)"
