apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: configure-spoke-default-cert
spec:
  params:
    - name: cluster-name
      type: string
    - name: pipeline-image
      type: string
  workspaces:
    - name: shared
  steps:
    - name: configure
      image: $(params.pipeline-image)
      imagePullPolicy: IfNotPresent
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        fleet-configure-spoke-default-cert \
          --cluster-name "$(params.cluster-name)" \
          --spoke-kubeconfig "$(workspaces.shared.path)/kubeconfig"
