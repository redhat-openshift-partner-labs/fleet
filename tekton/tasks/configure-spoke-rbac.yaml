apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: configure-spoke-rbac
spec:
  params:
    - name: cluster-name
      type: string
    - name: pipeline-image
      type: string
    - name: cluster-admins
      type: string
      default: ""
  workspaces:
    - name: shared
  steps:
    - name: configure
      image: $(params.pipeline-image)
      imagePullPolicy: IfNotPresent
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        fleet-configure-spoke-rbac \
          --cluster-name "$(params.cluster-name)" \
          --spoke-kubeconfig "$(workspaces.shared.path)/kubeconfig" \
          --cluster-admins "$(params.cluster-admins)"
