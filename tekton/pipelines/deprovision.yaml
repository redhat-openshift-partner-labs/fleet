apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: deprovision
spec:
  params:
    - name: cluster-name
      type: string
    - name: pipeline-image
      type: string
      default: quay.io/rhopl/fleet-pipeline:latest

  tasks:
    - name: load-config
      taskRef:
        name: config-loader
      params:
        - name: pipeline-image
          value: $(params.pipeline-image)

    - name: delete-cluster-resources
      taskRef:
        name: delete-cluster-resources
      runAfter:
        - load-config
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(tasks.load-config.results.pipeline-image)

    - name: wait-hive-uninstall
      taskRef:
        name: wait-hive-uninstall
      runAfter:
        - delete-cluster-resources
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(tasks.load-config.results.pipeline-image)
      timeout: "30m"

    - name: cleanup-hub-artifacts
      taskRef:
        name: cleanup-hub-artifacts
      runAfter:
        - wait-hive-uninstall
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(tasks.load-config.results.pipeline-image)

    - name: verify-deprovision
      taskRef:
        name: verify-deprovision
      runAfter:
        - cleanup-hub-artifacts
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(tasks.load-config.results.pipeline-image)

    - name: create-deployment-status
      taskRef:
        name: create-deployment-status
      runAfter:
        - verify-deprovision
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(tasks.load-config.results.pipeline-image)
        - name: pipeline-run-id
          value: $(context.pipelineRun.name)
        - name: clusters-repo
          value: $(tasks.load-config.results.clusters-repo)
        - name: github-app-id
          value: $(tasks.load-config.results.github-app-id)
        - name: github-app-installation-id
          value: $(tasks.load-config.results.github-app-installation-id)
        - name: github-app-key-secret
          value: $(tasks.load-config.results.github-app-key-secret)
